name: Build & Release

on:
  push:
    tags:
      - 'v*'

jobs:
  # ─── macOS → .dmg ──────────────────────────────────────────────────────────
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate icon assets
        run: python3 scripts/gen-icons.py

      # Install from workspace root so npm workspaces resolves correctly
      - name: Install dependencies (workspace root)
        run: npm install --no-audit --no-fund

      # electron-vite must run from app/ (it reads electron.vite.config.ts there)
      - name: Build renderer + main process
        run: npx electron-vite build
        working-directory: app

      - name: List build output
        run: ls -R app/out

      - name: Package macOS DMG (unsigned)
        run: |
          npx electron-builder --mac dmg --publish never \
            --config.mac.hardenedRuntime=false \
            --config.mac.gatekeeperAssess=false
        working-directory: app
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
          USE_HARD_LINKS: false
          DEBUG: electron-builder

      - name: List release output
        if: always()
        run: ls -la app/release/ || echo "release/ is empty"

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: mac-dmg
          path: app/release/*.dmg
          if-no-files-found: error

  # ─── Windows → NSIS .exe ───────────────────────────────────────────────────
  build-win:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate icon assets
        run: python scripts/gen-icons.py

      - name: Install dependencies (workspace root)
        run: npm install --no-audit --no-fund

      - name: Build renderer + main process
        run: npx electron-vite build
        working-directory: app

      - name: List build output
        run: dir app\out /s /b

      - name: Package Windows installer (unsigned)
        run: npx electron-builder --win nsis --publish never
        working-directory: app
        env:
          USE_HARD_LINKS: false
          DEBUG: electron-builder

      - name: List release output
        if: always()
        run: dir app\release /b || echo "release\ is empty"

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: win-exe
          path: app/release/*.exe
          if-no-files-found: error

  # ─── GitHub Release ─────────────────────────────────────────────────────────
  release:
    needs: [build-mac, build-win]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: mac-dmg
          path: dist/mac

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: win-exe
          path: dist/win

      - name: List artifacts
        run: find dist -type f | sort

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Flyby ${{ github.ref_name }}"
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          body: |
            ## Flyby ${{ github.ref_name }} ✈️

            A little airplane flies across your screen 5 minutes before every meeting.

            ### Download

            | Platform | File |
            |---|---|
            | macOS (Apple Silicon + Intel) | `Flyby-*.dmg` |
            | Windows 10/11 | `Flyby Setup *.exe` |

            > **macOS:** Right-click → Open to bypass Gatekeeper on first launch (app is unsigned).
            > **Windows:** Click "More info → Run anyway" on SmartScreen if prompted.

          files: |
            dist/mac/*.dmg
            dist/win/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
