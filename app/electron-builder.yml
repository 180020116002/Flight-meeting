appId: com.flyby.app
productName: Flyby
copyright: Copyright © 2024 Flyby

directories:
  output: release
  buildResources: build

files:
  - out/**/*
  - "!**/node_modules/**"
  - "!**/*.map"

extraResources:
  - from: resources/
    to: resources/
    filter:
      - "*.png"

# macOS configuration
mac:
  target:
    - target: dmg
      arch:
        - arm64
        - x64
    - target: zip
      arch:
        - arm64
        - x64
  category: public.app-category.productivity
  hardenedRuntime: false
  gatekeeperAssess: false
  # TODO: Enable for signed/notarized builds:
  # hardenedRuntime: true
  # entitlements: build/entitlements.mac.plist
  # entitlementsInherit: build/entitlements.mac.plist
  # identity: "Developer ID Application: Your Name (TEAM_ID)"

dmg:
  title: "${productName} ${version}"
  iconSize: 100
  window:
    width: 540
    height: 380
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications

# Windows configuration
win:
  target:
    - target: nsis
      arch:
        - x64
  # TODO: Set up code signing
  # certificateFile: path/to/cert.pfx
  # certificatePassword: YOUR_CERT_PASSWORD

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Flyby

# Auto-update — points to this GitHub repo's releases
publish:
  provider: github
  owner: 180020116002
  repo: Flight-meeting
